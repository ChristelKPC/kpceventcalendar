<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Events KPC 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --violet: #160D3D;
    --violet-mid: #1E1458;
    --violet-light: #2A1D7A;
    --orange: #FF6800;
    --orange2: #FF9604;
    --amber: #FBAE40;
    --white: #FFFFFF;
    --gray-100: #F4F3FB;
    --gray-200: #E8E6F5;
    --gray-400: #9B8FC0;
    --gray-600: #5C5278;
    --green: #1D9E75;
    --green-light: #E7FFF5;
    --blue: #320CC9;
    --blue-light: #EAE8FD;
    --actif: #1D9E75;
    --valide: #320CC9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-100);
    color: var(--violet);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--violet);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    border-bottom: 3px solid var(--orange);
  }
  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .header-left p {
    font-size: 13px;
    color: var(--gray-400);
    margin-top: 3px;
    font-weight: 300;
  }
  .header-badge {
    background: var(--orange);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* FILTERS */
  .filters {
    background: var(--white);
    padding: 16px 40px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(22,13,61,0.06);
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  select, .search-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--violet);
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover, .search-input:hover { border-color: var(--gray-400); }
  select:focus, .search-input:focus { border-color: var(--orange); }
  .search-input { min-width: 200px; }

  .view-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
    background: var(--gray-100);
    padding: 3px;
    border-radius: 8px;
  }
  .tab-btn {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gray-600);
    background: transparent;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tab-btn.active {
    background: var(--violet);
    color: white;
  }

  .counter {
    font-size: 12px;
    color: var(--gray-400);
    margin-left: 8px;
    white-space: nowrap;
  }
  .counter span {
    font-weight: 600;
    color: var(--orange);
  }

  /* MAIN */
  .main { padding: 28px 40px 60px; }

  /* TABLE VIEW */
  .table-view { display: none; }
  .table-view.active { display: block; }

  .table-wrapper {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(22,13,61,0.06);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: var(--violet);
  }
  thead th {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    padding: 13px 16px;
    text-align: left;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--gray-200);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--gray-100); }
  tbody tr:last-child { border-bottom: none; }
  tbody td {
    padding: 13px 16px;
    font-size: 13px;
    vertical-align: middle;
  }
  .td-name {
    font-weight: 500;
    color: var(--violet);
    max-width: 360px;
  }
  .td-date {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--orange);
    white-space: nowrap;
  }
  .td-editeur {
    font-size: 12px;
    color: var(--gray-600);
    white-space: nowrap;
  }

  /* STATUS BADGES */
  .badge {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-actif { background: var(--green-light); color: var(--green); }
  .badge-valide { background: var(--blue-light); color: var(--blue); }
  .badge-termine { background: #F1EFE8; color: #888780; }
  .badge-presentiel { background: #FFF5EF; color: var(--orange); }
  .badge-webinaire { background: #EDE9F8; color: #553C9A; }
  .date-warning {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; color: #B45309; background: #FEF3C7;
    padding: 2px 6px; border-radius: 3px; font-weight: 500;
    margin-top: 5px;
  }
  .code-sf-inline {
    font-size: 10px; color: var(--gray-400);
    font-family: 'Syne', sans-serif;
    margin-top: 4px; display: block;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* MONTH HEADER in table */
  .month-row td {
    background: var(--violet-mid);
    color: var(--amber);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* CALENDAR VIEW */
  .calendar-view { display: none; }
  .calendar-view.active { display: block; }

  .month-section { margin-bottom: 32px; }
  .month-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--violet);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--orange);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .month-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--gray-400);
    letter-spacing: 0;
    text-transform: none;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .event-card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    border-left: 3px solid var(--orange);
    box-shadow: 0 1px 4px rgba(22,13,61,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .event-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(22,13,61,0.12);
  }
  .event-card.valide { border-left-color: var(--blue); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--violet);
    line-height: 1.4;
    flex: 1;
  }
  .card-date {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--orange);
    white-space: nowrap;
    background: #FFF5EF;
    padding: 3px 7px;
    border-radius: 4px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 8px;
  }
  .card-editeur {
    font-size: 11px;
    color: var(--gray-600);
    font-weight: 400;
  }
  .badge-editeur {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.3px;
    background: var(--violet);
    color: var(--amber);
    white-space: nowrap;
  }
  .badge-editeur-sans {
    background: var(--gray-200);
    color: var(--gray-600);
  }
  .card-editeurs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
  }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--gray-600);
  }
  .empty-state p { font-size: 13px; }

  /* Code SF note */
  .code-sf-note {
    background: var(--violet);
    color: var(--amber);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .code-sf-missing {
    font-size: 11px;
    color: var(--gray-400);
    font-style: italic;
  }

  @media (max-width: 768px) {
    .header, .filters, .main { padding-left: 16px; padding-right: 16px; }
    .header { flex-direction: column; align-items: flex-start; }
    .filters { gap: 10px; }
    .view-tabs { margin-left: 0; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Planning Événements KPC 2026</h1>
    <p>Événements business — Statut Actif ou Validé · Mis à jour mai 2026</p>
  </div>
  <div class="header-badge">Process Sales / Marketing</div>
</div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Mois</span>
    <select id="filter-mois" onchange="applyFilters()">
      <option value="">Tous</option>
      <option value="2026-02">Février 2026</option>
      <option value="2026-03">Mars 2026</option>
      <option value="2026-04">Avril 2026</option>
      <option value="2026-05">Mai 2026</option>
      <option value="2026-06">Juin 2026</option>
      <option value="2026-09">Septembre 2026</option>
      <option value="2026-10">Octobre 2026</option>
      <option value="2026-11">Novembre 2026</option>
      <option value="2026-12">Décembre 2026</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Éditeur</span>
    <select id="filter-editeur" onchange="applyFilters()">
      <option value="">Tous</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Format</span>
    <select id="filter-format" onchange="applyFilters()">
      <option value="">Tous</option>
      <option value="Présentiel">Présentiel</option>
      <option value="Webinaire">Webinaire</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Statut</span>
    <select id="filter-statut" onchange="applyFilters()">
      <option value="">Tous</option>
      <option value="actif-valide">Actif</option>
      <option value="Terminé">Terminé</option>
    </select>
  </div>
  <input class="search-input" type="text" id="search-input" placeholder="Rechercher un event..." oninput="applyFilters()">
  <div class="counter" id="counter">— events</div>

  <div class="view-tabs">
    <button class="tab-btn active" id="tab-cal" onclick="switchView('calendar')">Calendrier</button>
    <button class="tab-btn" id="tab-tbl" onclick="switchView('table')">Tableau</button>
  </div>
</div>

<div class="main">
  <div class="calendar-view active" id="calendar-view"></div>
  <div class="table-view" id="table-view"></div>
</div>

<script>
const EDITEUR_MAP = {
  "0dc881c363874d118f886734d098c32e": "DBT",
  "120fe43461bc445c97c7223aca037066": "Imagino",

  "d7e939a5435442b98f98de5780a2cb93": "Onestream",
  "ef93e9497ea146d98114803c96fc8980": "SAP",
  "efa9722ae5b8439ea4b3165ebbd793db": "Snowflake",
};

const EVENTS = [
  // ── TERMINÉS ──────────────────────────────────────────────
  { name: "Webinar Informatica Data Observability", date: "2026-02-19", editeurs: ["Informatica"], statut: "Terminé", codeSF: "2026-KPC-WEBINAR-INORMATICA-0219", format: "Webinaire", dateWarning: false },
  { name: "Webinar CPM Express Onestream", date: "2026-03-12", editeurs: ["Onestream"], statut: "Terminé", codeSF: "2026-KPC-WEBINAIRE-ONESTREAM-0312", format: "Webinaire", dateWarning: false },
  { name: "Event SAP / SNOW / KPC — SAP Connect", date: "2026-03-19", editeurs: ["SAP", "Snowflake"], statut: "Terminé", codeSF: "2026-KPC-SAP-CONNECT-0319", format: "Présentiel", dateWarning: false },
  { name: "Dataquitaine 2026", date: "2026-03-19", editeurs: ["Sans éditeur"], statut: "Terminé", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "D4B Snowflake Paris — Black Diamond", date: "2026-04-14", editeurs: ["Snowflake"], statut: "Terminé", codeSF: "2026-KPC-D4B-SNOWFLAKE-0414", format: "Présentiel", dateWarning: false },
  { name: "Event SAP / SNOW — Lyon", date: "2026-04-23", editeurs: ["SAP", "Snowflake"], statut: "Terminé", codeSF: "2026-KPC-SAP-SNOWFLAKE-LYON-0423", format: "Présentiel", dateWarning: false },
  // ── ACTIFS / VALIDÉS ──────────────────────────────────────
  { name: "DBT / KPC — Synchro Webinar Datagouvernance", date: "2026-05-26", editeurs: ["DBT"], statut: "Actif", codeSF: "KPC-DBT-DATAGOUV-260526", format: "Webinaire", dateWarning: false },
  { name: "Cultive Ta Data — Montpellier", date: "2026-05-28", editeurs: ["Sans éditeur"], statut: "Actif", codeSF: "2026-KPC-CTD-260528", format: "Présentiel", dateWarning: false },
  { name: "SUMMIT — San Francisco", date: "2026-06-01", editeurs: ["Snowflake"], statut: "Actif", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "OS World Tour — Paris", date: "2026-06-02", editeurs: ["Onestream"], statut: "Actif", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "Kshuttle Connect 2026", date: "2026-06-04", editeurs: ["Kshuttle"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "Datagalaxy — Atelier Jeux de carte + Rex BEL — Paris — Q2", date: "2026-06-09", editeurs: ["Datagalaxy"], statut: "Actif", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "Datagalaxy — Webinar #1 Produit Portfolio — Q2", date: "2026-06-16", editeurs: ["Datagalaxy"], statut: "Actif", codeSF: "", format: "Webinaire", dateWarning: false },
  { name: "Event Coalesce / Snowflake / Fivetran — Paris", date: "2026-06-23", editeurs: ["Coalesce", "Snowflake", "Fivetran", "Omni"], statut: "Actif", codeSF: "2026-KPC-EVENT-FRDTLA-2026-0623", format: "Présentiel", dateWarning: false },
  { name: "Republic — Deauville", date: "2026-06-29", editeurs: ["Sans éditeur"], statut: "Actif", codeSF: "2026-KPC-REPUBLIK-DEAUVILLE-0629", format: "Présentiel", dateWarning: false },
  { name: "Imagino — Petit-déjeuner Rex Hyundai", date: "2026-06-30", editeurs: ["Imagino"], statut: "Actif", codeSF: "", format: "Présentiel", dateWarning: true },
  { name: "Oracle — Webinar Migration Essbase vers EPM Cloud", date: "2026-06-30", editeurs: ["Oracle"], statut: "Actif", codeSF: "", format: "Webinaire", dateWarning: true },
  { name: "Datagalaxy — Atelier Jeu Datagouv' — Aix-Marseille + REX — Q3", date: "2026-09-22", editeurs: ["Datagalaxy"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: true },
  { name: "Datagalaxy — Webinar #3 Success Story ARNAL — Q3", date: "2026-09-24", editeurs: ["Datagalaxy"], statut: "Validé", codeSF: "", format: "Webinaire", dateWarning: true },
  { name: "Pigment — Webinar Remplacement BPC", date: "2026-09-30", editeurs: ["Pigment"], statut: "Validé", codeSF: "", format: "Webinaire", dateWarning: true },
  { name: "Convention USF 2026 — Strasbourg", date: "2026-10-14", editeurs: ["SAP"], statut: "Actif", codeSF: "2026-KPC-USF-STRASBOURG-1014", format: "Présentiel", dateWarning: false },
  { name: "SWT — Snowflake World Tour", date: "2026-10-15", editeurs: ["Snowflake"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "Datagalaxy — Atelier Jeu Datagouv' — Toulouse — Q4", date: "2026-10-30", editeurs: ["Datagalaxy"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: true },
  { name: "Datagalaxy — Webinar #2 Souveraineté & Architecture On Prem — Q4", date: "2026-10-30", editeurs: ["Datagalaxy"], statut: "Validé", codeSF: "", format: "Webinaire", dateWarning: true },
  { name: "Partner Afterworks", date: "2026-11-12", editeurs: ["Sans éditeur"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: false },
  { name: "ADIRA — Lyon", date: "2026-12-14", editeurs: ["Sans éditeur"], statut: "Validé", codeSF: "", format: "Présentiel", dateWarning: false },
];

const MONTH_LABELS = {
  "2026-05": "Mai 2026",
  "2026-06": "Juin 2026",
  "2026-09": "Septembre 2026",
  "2026-10": "Octobre 2026",
  "2026-11": "Novembre 2026",
  "2026-12": "Décembre 2026",
};

function formatDate(d) {
  if (!d) return "Date à confirmer";
  const [y, m, day] = d.split('-');
  const months = ["jan","fév","mar","avr","mai","juin","juil","aoû","sep","oct","nov","déc"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

// Populate editeur filter
const allEditeurs = [...new Set(EVENTS.flatMap(e => e.editeurs))].sort();
const selEdit = document.getElementById('filter-editeur');
allEditeurs.forEach(ed => {
  const opt = document.createElement('option');
  opt.value = ed; opt.textContent = ed;
  selEdit.appendChild(opt);
});

let currentView = 'calendar';

function switchView(v) {
  currentView = v;
  document.getElementById('calendar-view').classList.toggle('active', v === 'calendar');
  document.getElementById('table-view').classList.toggle('active', v === 'table');
  document.getElementById('tab-cal').classList.toggle('active', v === 'calendar');
  document.getElementById('tab-tbl').classList.toggle('active', v === 'table');
  applyFilters();
}

function getFiltered() {
  const mois = document.getElementById('filter-mois').value;
  const editeur = document.getElementById('filter-editeur').value;
  const statut = document.getElementById('filter-statut').value;
  const format = document.getElementById('filter-format').value;
  const search = document.getElementById('search-input').value.toLowerCase().trim();

  return EVENTS.filter(e => {
    if (mois && !e.date.startsWith(mois)) return false;
    if (editeur && !e.editeurs.includes(editeur)) return false;
    if (statut === 'actif-valide' && !['Actif','Validé'].includes(e.statut)) return false;
    if (statut && statut !== 'actif-valide' && e.statut !== statut) return false;
    if (format && e.format !== format) return false;
    if (search && !e.name.toLowerCase().includes(search) && !e.editeurs.join(' ').toLowerCase().includes(search)) return false;
    return true;
  });
}

function applyFilters() {
  const filtered = getFiltered();
  document.getElementById('counter').innerHTML = `<span>${filtered.length}</span> event${filtered.length > 1 ? 's' : ''}`;

  if (currentView === 'calendar') renderCalendar(filtered);
  else renderTable(filtered);
}

function renderCalendar(events) {
  const container = document.getElementById('calendar-view');
  if (events.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>Aucun événement trouvé</h3><p>Modifiez les filtres pour voir plus de résultats.</p></div>`;
    return;
  }
  // Group by month
  const byMonth = {};
  events.forEach(e => {
    const m = e.date ? e.date.substring(0, 7) : 'N/A';
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(e);
  });

  let html = '';
  Object.entries(byMonth).sort().forEach(([m, evts]) => {
    const label = MONTH_LABELS[m] || m;
    html += `<div class="month-section">
      <div class="month-title">${label} <span class="month-count">${evts.length} event${evts.length > 1 ? 's' : ''}</span></div>
      <div class="cards-grid">`;
    evts.forEach(e => {
      const isTermine = e.statut === 'Terminé';
      const editeurBadges = e.editeurs.map(ed =>
        `<span class="badge-editeur${ed === 'Sans éditeur' ? ' badge-editeur-sans' : ''}">${ed}</span>`
      ).join('');
      html += `<div class="event-card ${e.statut === 'Validé' ? 'valide' : ''}" style="${isTermine ? 'opacity:0.55;border-left-color:#888780' : ''}">
        <div class="card-top">
          <div class="card-name">${e.name}</div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
            <div class="card-date">${formatDate(e.date)}</div>
            ${e.dateWarning ? `<div class="date-warning">⚠ À confirmer</div>` : ''}
          </div>
        </div>
        <div class="card-editeurs">${editeurBadges}</div>
        ${e.codeSF ? `<span class="code-sf-inline">Code SF : ${e.codeSF}</span>` : ''}
        <div class="card-footer">
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
            <span class="badge ${e.format === 'Webinaire' ? 'badge-webinaire' : 'badge-presentiel'}">${e.format}</span>
            <span class="badge ${e.statut === 'Terminé' ? 'badge-termine' : 'badge-actif'}">${e.statut === 'Terminé' ? 'Terminé' : 'Actif'}</span>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function renderTable(events) {
  const container = document.getElementById('table-view');
  if (events.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>Aucun événement trouvé</h3><p>Modifiez les filtres pour voir plus de résultats.</p></div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  events.forEach(e => {
    const m = e.date ? e.date.substring(0, 7) : 'N/A';
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(e);
  });

  let rows = '';
  Object.entries(byMonth).sort().forEach(([m, evts]) => {
    const label = MONTH_LABELS[m] || m;
    rows += `<tr class="month-row"><td colspan="5">${label} — ${evts.length} event${evts.length > 1 ? 's' : ''}</td></tr>`;
    evts.forEach(e => {
      const codeHtml = e.codeSF
        ? `<span style="font-size:11px;color:#5C5278;font-family:'DM Sans',sans-serif">Code SF : ${e.codeSF}</span>`
        : `<span class="code-sf-missing">À compléter</span>`;
      rows += `<tr style="${e.statut === 'Terminé' ? 'opacity:0.6' : ''}">
        <td class="td-date">${formatDate(e.date)}${e.dateWarning ? ' <span style="color:#B45309;font-size:10px">⚠</span>' : ''}</td>
        <td class="td-name">${e.name}${e.dateWarning ? '<br><span style="font-size:10px;color:#B45309">Date à confirmer</span>' : ''}</td>
        <td class="td-editeur">${e.editeurs.join(' · ')}</td>
        <td><span class="badge ${e.format === 'Webinaire' ? 'badge-webinaire' : 'badge-presentiel'}">${e.format}</span></td>
        <td>${codeHtml}</td>
        <td><span class="badge ${e.statut === 'Terminé' ? 'badge-termine' : 'badge-actif'}">${e.statut === 'Terminé' ? 'Terminé' : 'Actif'}</span></td>
      </tr>`;
    });
  });

  container.innerHTML = `<div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Événement</th>
          <th>Éditeur(s)</th>
          <th>Format</th>
          <th>Code SF</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// Init
applyFilters();
</script>
</body>
</html>
